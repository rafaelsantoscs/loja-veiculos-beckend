spring.application.name=loja-veiculos
server.port=8086

# ==============================
# MYSQL
# ==============================

spring.datasource.url=jdbc:mysql://localhost:3306/lojaveiculos?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
spring.datasource.username=root
spring.datasource.password=1234a
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================
# JPA
# ==============================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL5Dialect

# ==============================
# SERVIDOR
# ==============================

server.servlet.context-path=/loja-veiculos
server.address=0.0.0.0

# ==============================
# SPRING MVC
# ==============================

spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# Pasta onde ficarăo as imagens
spring.web.resources.static-locations=file:///C:/Users/Rafael/Pictures/FotosVeiculos/

# URL para acessar as imagens
spring.mvc.static-path-pattern=/uploads/**

# ==============================
# UPLOAD VEÍCULOS
# ==============================

# Pasta física base (sem o subdiretório "veiculos" — ele é adicionado pelo StorageService)
app.upload.veiculos-dir=C:/uploads

# URL pública
app.upload.base-url=http://localhost:8086/loja-veiculos/uploads

# ==============================
# UPLOAD GERAL
# ==============================

spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=16MB

# Upload de postagens (caso ainda utilize)
app.upload.dir=uploads/postagens

# ==============================
# SPRING
# ==============================

spring.main.allow-bean-definition-overriding=true

# ==============================
# LOGS
# ==============================

logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestResponseBodyMethodProcessor=DEBUG
logging.level.iam.solucoesdigitais.cliquesaude.controller.UsuarioController=DEBUG

